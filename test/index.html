<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweepstake Test Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    
    <script>
        // Mock fetch to intercept openfootball and return test data
        const originalFetch = window.fetch;
        window.fetch = async function(url) {
            if (url.includes('worldcup.json')) {
                const mockData = {
                    "name": "World Cup 2026",
                    "matches": [
                        // Group stage match: Mexico (Sam) beats South Africa (Higgins) 2-0 -> Sam gets 3 pts
                        {
                            "round": "Matchday 1",
                            "date": "2026-06-11",
                            "team1": "Mexico",
                            "team2": "South Africa",
                            "group": "Group A",
                            "score": {"ft": [2, 0]}
                        },
                        // Group stage match: Germany (Danny) draws with Curaçao (Chris) 1-1 -> Both get 1 pt
                        {
                            "round": "Matchday 4",
                            "date": "2026-06-14",
                            "team1": "Germany",
                            "team2": "Curaçao",
                            "group": "Group E",
                            "score": {"ft": [1, 1]}
                        },
                        // Knockout match: Germany loses to France (Matt J) -> Germany gets eliminated, France gets 10 pts
                        {
                            "round": "Round of 16",
                            "team1": "Germany",
                            "team2": "France",
                            "score": {"ft": [1, 3]}
                        },
                        // Final: Portugal (Sam) beats Argentina (Matt S) -> Portugal is winner, Argentina eliminated
                        {
                            "round": "Final",
                            "team1": "Portugal",
                            "team2": "Argentina",
                            "score": {"ft": [2, 1]}
                        },
                        // Future match for Curacao
                        {
                            "round": "Matchday 10",
                            "team1": "Ecuador",
                            "team2": "Curaçao"
                        }
                    ]
                };
                return new Response(JSON.stringify(mockData), { status: 200, headers: { 'Content-Type': 'application/json' } });
            }
            if (url.includes('data.json')) {
                return originalFetch('../data.json'); // Redirect to parent dir data
            }
            return originalFetch(url);
        };
    </script>
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>🧪 TEST: Sweepstake 2026</h1>
            <p>Mock Data Mode</p>
        </header>

        <main id="sweepstake-grid" class="grid">
            <div class="loading">Loading test allocations...</div>
        </main>
    </div>

    <script src="../app.js"></script>
</body>
</html>
